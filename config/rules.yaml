alerts:
  # ----- CPU -----
  - id: cpu_usage_warning
    name: "High CPU usage"
    metric: "cpu.usage_percent"
    operator: ">="
    threshold: 85.0
    severity: WARNING
    message: "CPU above 85% - inspect top processes."

  - id: cpu_usage_critical
    name: "Critical CPU usage"
    metric: "cpu.usage_percent"
    operator: ">="
    threshold: 95.0
    severity: CRITICAL
    message: "CPU above 95% - system may become unresponsive."

  # ----- LOAD AVERAGE -----
  - id: load_avg_warning
    name: "High load average"
    metric: "cpu.load_avg.1min"
    operator: ">="
    threshold: 4.0
    severity: WARNING
    message: "Load average above 4.0 - more processes than CPU cores can handle."

  # ----- RAM -----
  - id: ram_usage_warning
    name: "High RAM usage"
    metric: "ram.used_percent"
    operator: ">="
    threshold: 80.0
    severity: WARNING
    message: "RAM usage above 80% - monitor memory consumption."

  - id: ram_usage_critical
    name: "Critical RAM usage"
    metric: "ram.used_percent"
    operator: ">="
    threshold: 93.0
    severity: CRITICAL
    message: "RAM usage above 93% - risk of OOM error."

  # ----- DISK -----
  - id: disk_usage_warning
    name: "Low disk space"
    metric: "disk.used_percent"
    operator: ">="
    threshold: 80.0
    severity: WARNING
    message: "Disk above 80% - consider cleanup."

  - id: disk_usage_critical
    name: "Critical disk space"
    metric: "disk.used_percent"
    operator: ">="
    threshold: 92.0
    severity: CRITICAL
    message: "Disk above 92% - filesystem may become corrupted."

  # ----- JOURNAL ERRORS -----
  - id: journal_errors_detected
    name: "System errors detected"
    metric: "system_errors.count"
    operator: ">="
    threshold: 1
    severity: INFO
    message: "System errors found in journal from last 10 minutes."

# ----- AI ANALYSIS SETTINGS -----
ai_analysis:
  model: "gemini-2.0-flash"
  max_tokens: 1000
  language: "english"
  prompt_template: "Analyze the following system metrics and identify potential issues:"